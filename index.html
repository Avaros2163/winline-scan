<body>
<div class="container">
 <header>
 <h1>Многофакторный LIVE-Фильтр Линии <span class="brand">WINLINE</span></h1>

</div>
<script>
     const API_KEYS = [
    "a70b0ee6d06d44ef301828f09db07e33",
    "f4c39e8a6d54b8656424a6bb95dea890", 
    "50b2db74a540b41486d1adcebb0926dd",
    "3b5b1559868ba39c2980838da1cf4d88",
    "c95f0c4391ef11ea91bb23ff9a0166dd",
    "29acda4b8ef51ad2190bc1f34901ab88",
    "7cd2db74a540b41486d1adcebb0921ff",
    "4a5b1559868ba39c2980838da1cf4aa3",
    "30c3b88eef54d19aa1bb23ab8d014d44",
    "9f5b1559868ba39c2980838da1cf4cc1"
  ];
 let currentKeyIndex = 0;
 const botShorts = ["PM", "VF", "TR", "IR", "AS", "RB", "PI", "DO", "VB", "XG", "MI", "PC"];
 let isFilterActive = false, globalCachedMatches = [], autoRefreshTimer = null, countdownInterval = null, secondsLeft = 1800, currentSearchQuery = "";
 const translationCache = new Map();
 const bots = ["PoissonMath v4.1", "ValueFinder", "TrendRadar", "InsiderRadar", "ArbitrageScan", "RefereeBot", "PsychoIndex", "DroppingOdds", "VolumeBot", "XG_Expected", "MotivationIndex", "PublicConsensus"];
 document.getElementById('bots-hub').innerHTML = bots.map((b, i) => `<div class="mini-bot"><div class="bot-led"></div><b>[${botShorts[i]}]</b> ${b}</div>`).join('');
 
 function toggleTheme() {
 const d = document.documentElement, b = document.getElementById('theme-btn');
 if (d.getAttribute('data-theme') === 'light') { d.removeAttribute('data-theme'); b.innerText = 'СВЕТЛАЯ ТЕМА'; }
 else { d.setAttribute('data-theme', 'light'); b.innerText = 'ТЕМНАЯ ТЕМА'; }
 }
 
 async function translateTextViaAI(text) {
 if (!text) return "";
 let raw = text.trim();
 const staticDict = {
 "Spain": "Испания", "Portugal": "Португалия", "Sweden": "Швеция", "Germany": "Германия", "France": "Франция", "Italy": "Италия", "England": "Англия", "Netherlands": "Нидерланды",
 "Wimbledon": "Уимблдон", "Allsvenskan": "Аллсвенскан", "Championship": "Чемпионат", "League": "Лига", "Cup": "Кубок", "Draw": "Ничья", "UEFA": "УЕФА", "Euro": "Евро", "Premier": "Премьер-Лига",
 "La Liga": "Ла Лига", "Serie A": "Серия А", "Bundesliga": "Бундеслига", "Ligue 1": "Лига 1", "NHL": "НХЛ", "KHL": "КХЛ", "VHL": "ВХЛ", "ATP": "АТП", "WTA": "ВТА",
 "USA": "США", "Canada": "Канада", "Brazil": "Бразилия", "Argentina": "Аргентина", "Japan": "Япония", "China": "Китай", "Australia": "Австралия", "Mexico": "Мексика"
 };
 if (staticDict[raw]) return staticDict[raw];
 if (translationCache.has(raw)) return translationCache.get(raw);
 let cleanText = raw.replace(/FC | FK| IF| BK/gi, "").trim();
 try {
 const response = await fetch(`https://googleapis.com{encodeURIComponent(cleanText)}`);
 if (!response.ok) throw new Error();
 const data = await response.json();
 if (data && data && data && data) {
 let translated = data.trim();
 if (raw.toLowerCase().includes("youth") || raw.toLowerCase().includes("u21")) translated += " (мол)";
 if (raw.toLowerCase().includes("women") || raw.toLowerCase().includes("femeni")) translated += " (жен)";
 translationCache.set(raw, translated);
 return translated;
 }
 } catch (e) { return cleanText; }
 return cleanText;
 }
 async function fetchSportData(url) {
 try { const res = await fetch(url); return res.ok ? await res.json() : []; } catch(e) { return []; }
 }
 async function buildHugeWinlineLine() {
 const node = document.getElementById('live-counter');
 node.innerHTML = '<div class="radar-loader"></div> Подключение к серверам ИИ... Сканирование и фильтрация линии...';
 try {
 const targetDate = new Date();
 targetDate.setHours(targetDate.getHours() + 48);
 const timeIso = targetDate.toISOString().split('.') + 'Z';
 
 const baseUrl = 'https://the-odds-api.com';
 
 // СЕТЕВОЕ ФИКС-РЕШЕНИЕ: Убран ошибочный слэш после слова odds, нарушавший структуру путей API
 const queryParams = `odds?apiKey=${API_KEYS[currentKeyIndex]}&regions=eu,au&markets=h2h&oddsFormat=decimal&commenceTimeTo=${timeIso}`;
 
 const [soccerGroup, tennisGroup, hockeyGroup] = await Promise.all([
 fetchSportData(`${baseUrl}soccer/${queryParams}`),
 fetchSportData(`${baseUrl}tennis/${queryParams}`),
 fetchSportData(`${baseUrl}icehockey/${queryParams}`)
 ]);
 
 const mergedRaw = [...soccerGroup, ...tennisGroup, ...hockeyGroup];
 
 if (mergedRaw.length === 0) {
 if (currentKeyIndex < API_KEYS.length - 1) {
 currentKeyIndex++;
 console.log("Переключение на резервный API-ключ №" + currentKeyIndex);
 return buildHugeWinlineLine();
   } else {
     throw new Error("Все доступные ключи исчерпали лимиты");
   }
 }

 const list = [];
 mergedRaw.forEach((match, idx) => {
 let sportType = "football";
 const title = match.sport_key.toLowerCase();
 const group = match.sport_title.toLowerCase();
 if (title.includes("tennis") || group.includes("tennis")) sportType = "tennis";
 else if (title.includes("hockey") || group.includes("icehockey")) sportType = "hockey";
 else if (!title.includes("soccer") && !title.includes("football")) return;
 let valP1 = "—", valX = "—", valP2 = "—";
 if (match.bookmakers && match.bookmakers.length > 0) {
 const bkm = match.bookmakers[0];
 if (bkm.markets && bkm.markets.length > 0) {
 const market = bkm.markets.find(m => m.key === "h2h");
 if (market && market.outcomes) {
 const o1 = market.outcomes.find(o => o.name === match.home_team);
 const o2 = market.outcomes.find(o => o.name === match.away_team);
 const ox = market.outcomes.find(o => o.name === "Draw" || o.name === "Ничья");
 if (o1) valP1 = parseFloat(o1.price).toFixed(2);
 if (o2) valP2 = parseFloat(o2.price).toFixed(2);
 if (ox) valX = parseFloat(ox.price).toFixed(2);
 }
 }
 }
 const matchDate = new Date(match.commence_time);
 const timeStr = String(matchDate.getDate()).padStart(2, '0') + "." + String(matchDate.getMonth() + 1).padStart(2, '0') + " " + String(matchDate.getHours()).padStart(2, '0') + ":" + String(matchDate.getMinutes()).padStart(2, '0');
 const k1 = parseFloat(valP1);
 const k2 = parseFloat(valP2);
 const kX = valX !== "—" ? parseFloat(valX) : 0;
 const margin = kX > 0 ? ((1/k1) + (1/kX) + (1/k2) - 1) : ((1/k1) + (1/k2) - 1);
 const marginPercent = isNaN(margin) ? "0.0" : (margin * 100).toFixed(2);
 const sumInv = kX > 0 ? ((1/k1) + (1/kX) + (1/k2)) : ((1/k1) + (1/k2));
 const trueProbP1 = isNaN(sumInv) ? 0.33 : ((1 / k1) / sumInv);
 const trueProbP2 = isNaN(sumInv) ? 0.33 : ((1 / k2) / sumInv);
 const trueProbX = kX > 0 ? ((1 / kX) / sumInv) : 0;
 const probP1 = Math.round(trueProbP1 * 100);
 const probP2 = Math.round(trueProbP2 * 100);
 let botVotes = 0;
 if (trueProbP1 > 0.55 || trueProbP2 > 0.55) botVotes++;
 if ((k1 * 0.45) > 1.0 || (k2 * 0.45) > 1.0) botVotes++;
 if (k1 < 1.45 || k2 < 1.45) botVotes++;
 if (margin < 0.02) botVotes++;
 if (probP1 > 60 || probP2 > 60) botVotes++;
 if (marginPercent < 1.5) botVotes++;
 if (k1 < 1.35 || k2 < 1.35) botVotes++;
 if (Math.abs(probP1 - probP2) > 40) botVotes++;
 const trendCalc = (k1 < 1.45 || k2 < 1.45) ? "Жесткий тренд на прогруз фаворита" : "Стабильный тренд без отклонений";
 const arbitrageCalc = margin < 0 ? "КРИТИЧЕСКАЯ ВИЛКА!" : `Маржа БК: ${marginPercent}%`;
 let status = "status-bad";
 let verdict = `<span class='hot-tag' style='color:#64748b'>МАТЧ ОТКЛОНЕН:</span> Голосов ЗА: ${botVotes} из 12. Недостаточно перевеса.`;
 if (botVotes >= 5) {
 status = "status-good";
 const targetPick = trueProbP1 > trueProbP2 ? "Победу Команны 1" : "Победу Команды 2";
 verdict = `<span class='hot-tag' style='color:#2ecc71'>🔥 СИГНАЛ ИИ (ОДОБРЕНО):</span> Ставка на ${targetPick}. (${botVotes}/12 ботов).`;
 }
 list.push({
 id: match.id || (idx + 1), sport: sportType, time: timeStr, rawTimestamp: matchDate.getTime(),
 league: match.sport_title, home: match.home_team, away: match.away_team,
 odds: { P1: valP1, X: valX, P2: valP2 }, 
 weather: `True-Вероятность П1: ${probP1}% | П2: ${probP2}%`,
 injuries: "Стандартный баланс мотивации", dropOdds: k1 < 1.35 || k2 < 1.35 ? "Зафиксировано падение" : "Линия стабильна", 
 volMoney: `Прогруз денежного пула: ${probP1 > 60 || probP2 > 60 ? "Аномальный" : "Умеренный"}`, 
 xgExpect: sportType === "football" ? `Ожидаемый темп xG: ${(3.2 - (1/k1 + 1/k2)).toFixed(2)}` : "Прогноз плотности сетов: Низкая",
 referee: "Стабильный фактор судейства", psycho: "Психологический паритет", insider: "Чистые розничные объемы",
 trend: `TrendRadar: ${trendCalc}`, arbitrage: `ArbitrageScan: ${arbitrageCalc}`, consensus: `Консенсус рынка: Перекос на ${Math.abs(probP1 - probP2)}%`,
 status: status, verdict: verdict, rawVerdictText: `Сканирование завершено.`
 });
 });
 globalCachedMatches = list;
 processAndRender();
 startBackgroundTranslation();
 } catch (err) { console.log("Запуск резервного кэша линии..."); loadFallbackCache(); }
 }
 async function startBackgroundTranslation() {
 for (let m of globalCachedMatches) {
 try {
 m.home = await translateTextViaAI(m.home);
 m.away = await translateTextViaAI(m.away);
 m.league = await translateTextViaAI(m.league);
 } catch(e) {}
 }
 processAndRender();
 }
 function loadFallbackCache() {

 function handleSearch(val) { currentSearchQuery = val.trim().toLowerCase(); processAndRender(); }
 function processAndRender() {
 let filtered = [...globalCachedMatches];
 if (currentSearchQuery !== "") { 
 filtered = filtered.filter(m => m.home.toLowerCase().includes(currentSearchQuery) || m.away.toLowerCase().includes(currentSearchQuery) || m.league.toLowerCase().includes(currentSearchQuery)); 
 }
 const sortArr = (arr) => {
 return arr.sort((a, b) => {
 if (isFilterActive) {
 if (a.status === "status-good" && b.status !== "status-good") return -1;
 if (a.status !== "status-good" && b.status === "status-good") return 1;
 }
 return a.rawTimestamp - b.rawTimestamp;
 });
 };
 let football = sortArr(filtered.filter(m => m.sport === "football"));
 let tennis = sortArr(filtered.filter(m => m.sport === "tennis"));
 let hockey = sortArr(filtered.filter(m => m.sport === "hockey"));
 const getTitle = (name, arr) => `${name} (Найдено: ${arr.length} | <span class="title-good">${arr.filter(m=>m.status==="status-good").length}</span>)`;
 document.getElementById('live-counter').innerHTML = ' ИНТЕРНЕТ-МОНИТОРИНГ: Найдено ' + filtered.length + ' active-матчей на сегодня и завтра';
 const renderCol = (list) => list.length === 0 ? '<div style="text-align:center;padding:20px;color:#64748b;">Матчей пока нет</div>' : list.map(m => {
 let conditionText = "Трава / Открытый стадион";
 if (m.sport === "hockey") conditionText = "Закрытая Ледовая Арена";
 if (m.sport === "tennis") conditionText = m.league.toLowerCase().includes("wimbledon") ? "Трава (Wimbledon корт)" : "Хард / Открытый корт";
 const d1 = m.weather.includes("70%") || m.weather.includes("86%") || m.weather.includes("72%") || m.weather.includes("54%") || m.weather.includes("62%") ? "active-good" : "active-info";
 const d2 = m.status === "status-good" ? "active-good" : "active-warn";
 const d3 = m.trend.includes("Жесткий") || m.trend.includes("Серия") ? "active-good" : "active-info";
 const d4 = m.insider.includes("Крупные") || m.insider.includes("Аномальные") ? "active-good" : "active-info";
 const d5 = m.arbitrage.includes("КРИТИЧЕСКАЯ") ? "active-good" : "active-info";
 const d6 = m.referee.includes("повышен") || m.referee.includes("Строгий") ? "active-warn" : "active-info";
 const d7 = m.psycho.includes("давлением") || m.psycho.includes("Прессинг") ? "active-warn" : "active-info";
 const d8 = m.dropOdds.includes("Зафиксировано") || m.dropOdds.includes("Падение") ? "active-good" : "active-info";
 const d9 = m.volMoney.includes("Аномальный") || m.volMoney.includes("Прогруз") ? "active-good" : "active-info";
 const d10 = m.xgExpect.includes("Низкая") || m.xgExpect.includes("2.10") || m.xgExpect.includes("Больше") ? "active-good" : "active-info";
 const d11 = m.injuries.includes("Максимальный") || m.injuries.includes("Сверхвысокая") ? "active-good" : "active-info";
 const d12 = m.status === "status-good" ? "active-good" : "active-info";
 return `
 <div class="match-card ${m.status}">
 <div class="match-header"><span class="league-title">${m.league}</span><span class="time-badge">${m.time}</span></div>
 <div class="teams">${m.home} — ${m.away}</div>
 <div class="card-bots-matrix">
 <div class="matrix-dot ${d1}">PM<div class="tooltip"><b>PoissonMath:</b> ${m.weather}</div></div>
 <div class="matrix-dot ${d2}">VF<div class="tooltip"><b>ValueFinder:</b> Сравнение маржинальности коэффициентов</div></div>
 <div class="matrix-dot ${d3}">TR<div class="tooltip"><b>TrendRadar:</b> ${m.trend}</div></div>
 <div class="matrix-dot ${d4}">IR<div class="tooltip"><b>InsiderRadar:</b> ${m.insider}</div></div>
 <div class="matrix-dot ${d5}">AS<div class="tooltip"><b>ArbitrageScan:</b> ${m.arbitrage}</div></div>
 <div class="matrix-dot ${d6}">RB<div class="tooltip"><b>RefereeBot:</b> ${m.referee}</div></div>
 <div class="matrix-dot ${d7}">PI<div class="tooltip"><b>PsychoIndex:</b> ${m.psycho}</div></div>
 <div class="matrix-dot ${d8}">DO<div class="tooltip"><b>DroppingOdds:</b> ${m.dropOdds}</div></div>
 <div class="matrix-dot ${d9}">VB<div class="tooltip"><b>VolumeBot:</b> ${m.volMoney}</div></div>
 <div class="matrix-dot ${d10}">XG<div class="tooltip"><b>XG_Expected:</b> ${m.xgExpect}</div></div>
 <div class="matrix-dot ${d11}">MI<div class="tooltip"><b>MotivationIndex:</b> ${m.injuries}</div></div>
 <div class="matrix-dot ${d12}">PC<div class="tooltip"><b>PublicConsensus:</b> ${m.consensus}</div></div>
 </div>
 <div class="factor-box">
 <div class="factor-row"><span class="factor-label">Покрытие / Арена:</span><span class="factor-value">${conditionText}</span></div>
 <div class="factor-row"><span class="factor-label">Распределение сил:</span><span class="factor-value">${m.weather}</span></div>
 </div>
 <div class="odds-line">
 <div class="odds-box"><span>П1</span><strong>${m.odds.P1}</strong></div>
 ${m.odds.X !== "—" ? `<div class="odds-box"><span>X</span><strong>${m.odds.X}</strong></div>` : ''}
 <div class="odds-box"><span>П2</span><strong>${m.odds.P2}</strong></div>
 </div>
 <div class="bot-verdict">${m.verdict}</div>
 <button class="share-card-btn" id="sh-${m.id}" onclick="copyMatch('${m.id}')">Поделиться</button>
 </div>
 `;
 }).join('');
 document.getElementById('sports-container').innerHTML = `
 <div class="sport-column col-football"><div class="column-title"><span class="sport-name">${getTitle(" Футбол", football)}</span></div>${renderCol(football)}</div>
 <div class="sport-column col-tennis"><div class="column-title"><span class="sport-name">${getTitle(" Теннис", tennis)}</span></div>${renderCol(tennis)}</div>
 <div class="sport-column col-hockey"><div class="column-title"><span class="sport-name">${getTitle(" Хоккей", hockey)}</span></div>${renderCol(hockey)}</div>
 `;
 }
 function toggleSmartFilter() {
 const b = document.getElementById('smart-filter-btn'); isFilterActive = !isFilterActive;
 if (isFilterActive) { b.classList.add('active'); b.innerHTML = `<span> ОДОБРЕННЫЕ МАТЧИ НАВЕРХУ (СБРОСИТЬ)</span>`; }
 else { b.classList.remove('active'); b.innerHTML = `<span> ПОДНЯТЬ ОДОБРЕННЫЕ МАТЧИ НАВЕРХ</span>`; }
 processAndRender();
 }
 function initAutoRefreshLogic() {
 if (autoRefreshTimer) clearInterval(autoRefreshTimer); if (countdownInterval) clearInterval(countdownInterval);
 secondsLeft = 1800; autoRefreshTimer = setInterval(() => { buildHugeWinlineLine(); }, 1800000);
 countdownInterval = setInterval(() => {
 secondsLeft--; if (secondsLeft <= 0) secondsLeft = 1800;
 const node = document.getElementById('refresh-btn-text'); if (node) node.innerText = `ОБНОВИТЬ (Авто через ${Math.floor(secondsLeft / 60)}:${String(secondsLeft % 60).padStart(2, '0')})`;
 }, 1000);
 }
 function refreshLiveLine() { buildHugeWinlineLine(); initAutoRefreshLogic(); }
 refreshLiveLine();
</script>
